    <marker id="afR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0.5 L6,2.5 L0,4.5" fill="#c0392b"/></marker>
  </defs>

  <rect width="960" height="580" fill="#fff"/>

  <!-- Title -->
  <text x="480" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" letter-spacing="0.5">Stacking Ensemble Architecture</text>
  <text x="480" y="42" text-anchor="middle" font-size="9.5" fill="#94a3b8">Two-layer Stacking  |  5-Fold Stratified CV  |  Diverse Loss Functions</text>

  <!-- ================================================================ -->
  <!-- INPUT: Feature Vector -->
  <!-- ================================================================ -->
  <rect x="340" y="56" width="280" height="36" rx="5" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8"/>
  <text x="480" y="72" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4338ca">Input: 63 features + 3 anomaly scores + 16 GNN embeddings</text>
  <text x="480" y="84" text-anchor="middle" font-size="7.5" fill="#6366f1">82-dimensional feature vector per user</text>

  <!-- Arrows input to 3 models -->
  <path d="M 400 92 L 400 108 Q 400 116 390 116 L 175 116 Q 165 116 165 124 L 165 138" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#af)"/>
  <path d="M 480 92 L 480 138" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#af)"/>
  <path d="M 560 92 L 560 108 Q 560 116 570 116 L 795 116 Q 805 116 805 124 L 805 138" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#af)"/>

  <!-- 5-Fold CV indicator -->
