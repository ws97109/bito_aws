    <text x="0" y="0" font-weight="600" fill="#e67e22">2500 iter</text>
    <text x="58" y="0">depth=6</text>
    <text x="110" y="0">lr=0.005</text>
    <text x="0" y="14" font-weight="600" fill="#c0392b">scale_pos_weight=50</text>
    <text x="0" y="28" fill="#7f8c8d">eval: AUCPR  |  early_stop: 150</text>
  </g>

  <!-- LightGBM -->
