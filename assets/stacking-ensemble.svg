    <line x1="90" y1="45" x2="105" y2="64" stroke="#1e293b" stroke-width="0.6"/>

    <!-- Second tree (boosted) -->
    <text x="128" y="40" font-size="14" fill="#d68910" font-weight="700">+</text>
    <circle cx="180" cy="10" r="6" fill="#e67e22" opacity="0.5"/>
    <circle cx="158" cy="40" r="4" fill="#e67e22" opacity="0.35"/>
    <circle cx="202" cy="40" r="4" fill="#e67e22" opacity="0.35"/>
    <circle cx="148" cy="62" r="3" fill="#27ae60" opacity="0.4"/>
    <circle cx="168" cy="62" r="3" fill="#e74c3c" opacity="0.4"/>
    <circle cx="192" cy="62" r="3" fill="#e74c3c" opacity="0.4"/>
    <circle cx="212" cy="62" r="3" fill="#27ae60" opacity="0.4"/>
    <line x1="180" y1="16" x2="158" y2="36" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    <line x1="180" y1="16" x2="202" y2="36" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    <line x1="158" y1="44" x2="148" y2="59" stroke="#1e293b" stroke-width="0.4" opacity="0.4"/>
    <line x1="158" y1="44" x2="168" y2="59" stroke="#1e293b" stroke-width="0.4" opacity="0.4"/>
    <line x1="202" y1="44" x2="192" y2="59" stroke="#1e293b" stroke-width="0.4" opacity="0.4"/>
    <line x1="202" y1="44" x2="212" y2="59" stroke="#1e293b" stroke-width="0.4" opacity="0.4"/>

    <text x="225" y="40" font-size="11" fill="#d68910" opacity="0.5">...</text>
  </g>

  <!-- Params -->
