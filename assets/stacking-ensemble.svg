      <circle cx="65" cy="62" r="3.5" fill="#e74c3c" opacity="0.5"/>
      <circle cx="85" cy="62" r="3.5" fill="#27ae60" opacity="0.5"/>
      <line x1="55" y1="21" x2="35" y2="36" stroke="#1e293b" stroke-width="0.6"/>
      <line x1="55" y1="21" x2="75" y2="36" stroke="#1e293b" stroke-width="0.6"/>
      <line x1="35" y1="44" x2="25" y2="58" stroke="#1e293b" stroke-width="0.5"/>
      <line x1="35" y1="44" x2="45" y2="58" stroke="#1e293b" stroke-width="0.5"/>
