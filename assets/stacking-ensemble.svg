      <text x="100" y="80" text-anchor="end" font-size="4.5" fill="#1e293b">p_t</text>
      <!-- CE curve (gray, higher) -->
      <path d="M 12,14 Q 30,16 50,30 Q 70,48 95,70" fill="none" stroke="#bdc3c7" stroke-width="1"/>
      <text x="96" y="60" font-size="4.5" fill="#bdc3c7">CE</text>
      <!-- Focal curve (green, lower for easy samples) -->
      <path d="M 12,18 Q 25,22 40,45 Q 55,62 95,70" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
      <text x="50" y="54" font-size="4.5" fill="#2ecc71" font-weight="600">FL</text>
    </g>
  </g>

  <!-- Params -->
  <g transform="translate(358, 286)" font-size="8" fill="#1e293b">
    <text x="0" y="0" font-weight="600" fill="#2ecc71">2500 iter</text>
    <text x="18" y="22">depth=4</text>
    <text x="70" y="22">leaves=63</text>
    <text x="0" y="38" font-weight="600" fill="#c0392b">Focal Loss  a=0.75  g=2.0</text>
    <text x="120" y="38" fill="#7f8c8d">lr=0.008  |  no scale_pos_weight</text>
  </g>

  <!-- CatBoost -->
  <rect x="650" y="164" width="280" height="170" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="650" y="164" width="280" height="28" rx="6" fill="#3498db"/>
  <rect x="650" y="186" width="280" height="6" fill="#3498db"/>
  <text x="790" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CatBoost</text>

  <!-- Ordered boosting illustration -->
  <g transform="translate(668, 200)">
