    <rect x="36" y="24" width="16" height="8" rx="1" fill="#27ae60" opacity="0.8"/>
    <rect x="54" y="24" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="72" y="24" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <text x="96" y="31" font-size="5.5" fill="#64748b">Fold 3</text>

    <rect x="0" y="36" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="18" y="36" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="36" y="36" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="54" y="36" width="16" height="8" rx="1" fill="#27ae60" opacity="0.8"/>
    <rect x="72" y="36" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <text x="96" y="43" font-size="5.5" fill="#64748b">Fold 4</text>

    <rect x="0" y="48" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="18" y="48" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="36" y="48" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="54" y="48" width="16" height="8" rx="1" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="0.3"/>
    <rect x="72" y="48" width="16" height="8" rx="1" fill="#27ae60" opacity="0.8"/>
    <text x="96" y="55" font-size="5.5" fill="#64748b">Fold 5</text>

    <rect x="0" y="63" width="12" height="6" rx="1" fill="#27ae60"/>
    <text x="16" y="68" font-size="5" fill="#64748b">= validation fold</text>
  </g>

  <!-- ================================================================ -->
  <!-- LAYER 0: Three Base Learners -->
  <!-- ================================================================ -->
  <text x="480" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#1e293b" letter-spacing="1">LAYER 0 : BASE LEARNERS</text>

  <!-- XGBoost -->
  <rect x="30" y="164" width="280" height="170" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="30" y="164" width="280" height="28" rx="6" fill="#e67e22"/>
  <rect x="30" y="186" width="280" height="6" fill="#e67e22"/>
  <text x="170" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">XGBoost</text>

