    <circle cx="45" cy="68" r="4" fill="#e74c3c" opacity="0.6"/>
    <!-- Leaf-wise: deeper split on highest loss leaf -->
    <circle cx="78" cy="68" r="4" fill="#2ecc71" opacity="0.4"/>
    <circle cx="102" cy="68" r="4" fill="#2ecc71" opacity="0.4"/>
    <circle cx="68" cy="90" r="3" fill="#e74c3c" opacity="0.5"/>
    <circle cx="88" cy="90" r="3" fill="#27ae60" opacity="0.5"/>
    <line x1="60" y1="16" x2="30" y2="35" stroke="#1e293b" stroke-width="0.8"/>
    <line x1="60" y1="16" x2="90" y2="35" stroke="#1e293b" stroke-width="0.8"/>
    <line x1="30" y1="45" x2="15" y2="64" stroke="#1e293b" stroke-width="0.6"/>
    <line x1="30" y1="45" x2="45" y2="64" stroke="#1e293b" stroke-width="0.6"/>
    <line x1="90" y1="45" x2="78" y2="64" stroke="#1e293b" stroke-width="0.6"/>
    <line x1="90" y1="45" x2="102" y2="64" stroke="#1e293b" stroke-width="0.6"/>
    <line x1="78" y1="72" x2="68" y2="87" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="2,1"/>
