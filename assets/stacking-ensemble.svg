  <text x="90" y="72" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1e8449">5-Fold Stratified</text>
  <text x="90" y="84" text-anchor="middle" font-size="7.5" fill="#27ae60">Cross-Validation</text>

  <!-- Fold visualization -->
  <g transform="translate(42, 100)">
    <rect x="0" y="0" width="16" height="8" rx="1" fill="#27ae60" opacity="0.8"/>
