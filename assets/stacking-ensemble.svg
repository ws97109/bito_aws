      <text x="33" y="68" text-anchor="middle" font-size="5" fill="#2471a3">t=2</text>
    </g>
    <g>
      <rect x="48" y="5" width="18" height="55" rx="2" fill="#d6eaf8" stroke="#85c1e9" stroke-width="0.5"/>
      <rect x="48" y="5" width="18" height="10" rx="2" fill="#e74c3c" opacity="0.5"/>
      <rect x="48" y="17" width="18" height="10" fill="#e74c3c" opacity="0.5"/>
      <rect x="48" y="29" width="18" height="10" fill="#e74c3c" opacity="0.5"/>
      <rect x="48" y="41" width="18" height="10" fill="#3498db" opacity="0.15"/>
      <text x="57" y="68" text-anchor="middle" font-size="5" fill="#2471a3">t=3</text>
