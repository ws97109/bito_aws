  <rect x="700" y="404" width="230" height="60" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="815" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#1e293b">Loss Function Diversity</text>
