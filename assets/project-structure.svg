  <rect x="220" y="206" width="320" height="36" rx="4" fill="#fdedec" stroke="#c0392b" stroke-width="0.8"/>
  <text x="380" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#922b21">main.py</text>
  <text x="380" y="236" text-anchor="middle" font-size="8" fill="#b03a2e">Pipeline controller  |  12-step automated workflow</text>

