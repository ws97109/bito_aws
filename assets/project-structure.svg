  <rect x="374" y="294" width="114" height="52" rx="4" fill="#eafaf1" stroke="#a9dfbf" stroke-width="0.7"/>
  <rect x="374" y="294" width="114" height="18" rx="4" fill="#27ae60"/>
  <text x="380" y="306" font-size="8" fill="#fff" font-weight="600">STEP 3.5</text>
  <text x="431" y="326" text-anchor="middle" font-size="9" font-weight="600" fill="#1e8449">anomaly_</text>
  <text x="431" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#1e8449">detection.py</text>

