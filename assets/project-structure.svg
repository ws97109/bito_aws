    <text x="345" y="107" fill="#5b7a9d" font-size="7.5">7 CSV tables</text>

    <rect x="394" y="80" width="88" height="34" rx="3" fill="#d6eaf8" stroke="#85c1e9" stroke-width="0.6"/>
    <text x="438" y="95" fill="#1a5276" font-weight="600">adjust_data/</text>
    <text x="438" y="107" fill="#5b7a9d" font-size="7.5">train / test split</text>

    <rect x="492" y="80" width="88" height="34" rx="3" fill="#d6eaf8" stroke="#85c1e9" stroke-width="0.6"/>
    <text x="536" y="95" fill="#1a5276" font-weight="600">train_label</text>
    <text x="536" y="107" fill="#5b7a9d" font-size="7.5">51,017 labels</text>

    <rect x="590" y="80" width="88" height="34" rx="3" fill="#d6eaf8" stroke="#85c1e9" stroke-width="0.6"/>
    <text x="634" y="95" fill="#1a5276" font-weight="600">predict_label</text>
    <text x="634" y="107" fill="#5b7a9d" font-size="7.5">12,753 unlabeled</text>
  </g>

  <!-- Arrow: Data → ML Pipeline -->
  <path d="M 480 126 L 480 152" fill="none" stroke="#2980b9" stroke-width="1.5" marker-end="url(#aB)"/>
  <text x="498" y="144" font-size="8" fill="#2980b9" font-weight="500">770K+ records</text>

