  <text x="299" y="326" text-anchor="middle" font-size="9.5" font-weight="600" fill="#922b21">feature_selection.py</text>
  <text x="299" y="340" text-anchor="middle" font-size="7.5" fill="#b03a2e">81 → 63 dims</text>

