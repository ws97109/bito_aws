  <rect width="960" height="780" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50" letter-spacing="0.5">Project Structure &amp; Data Flow</text>
  <text x="480" y="50" text-anchor="middle" font-size="10" fill="#7f8c8d">Bio_AWS_Workshop  |  Module Dependencies &amp; Pipeline Data Flow</text>

