  <text x="621" y="326" text-anchor="middle" font-size="9.5" font-weight="600" fill="#6c3483">Gnn_model.py</text>
  <text x="621" y="340" text-anchor="middle" font-size="7.5" fill="#7d3c98">HeteroSAGE + GAT → 16d embed</text>

