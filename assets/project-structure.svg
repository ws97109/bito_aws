  <rect x="54" y="294" width="170" height="52" rx="4" fill="#fdedec" stroke="#f5b7b1" stroke-width="0.7"/>
  <rect x="54" y="294" width="170" height="18" rx="4" fill="#c0392b"/>
  <text x="60" y="306" font-size="8" fill="#fff" font-weight="600">STEP 1-2</text>
  <text x="139" y="326" text-anchor="middle" font-size="9.5" font-weight="600" fill="#922b21">Feature_rngineering.py</text>
  <text x="139" y="340" text-anchor="middle" font-size="7.5" fill="#b03a2e">11 categories → 81 dims</text>

  <!-- Step 2.5: Feature Selection -->
  <rect x="234" y="294" width="130" height="52" rx="4" fill="#fdedec" stroke="#f5b7b1" stroke-width="0.7"/>
  <rect x="234" y="294" width="130" height="18" rx="4" fill="#c0392b"/>
