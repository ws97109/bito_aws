  <path d="M 139 346 L 139 370 Q 139 378 149 378 L 230 378 Q 238 378 238 386 L 238 396" fill="none" stroke="#c0392b" stroke-width="1" marker-end="url(#aR)"/>
  <text x="168" y="375" font-size="7" fill="#b03a2e">81 features</text>

