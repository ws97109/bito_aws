# BitoGuard Configuration File
# Version: 1.0
# Project: GraphSAGE-ARM-CF for Fraud Detection

# Data Paths
data:
  raw_data_dir: "/Users/tommy/Bio_AWS_Workshop/RawData"
  output_dir: "./results"
  user_info: "user_info.csv"
  twd_transfer: "twd_transfer.csv"
  usdt_swap: "usdt_swap.csv"
  usdt_twd_trading: "usdt_twd_trading.csv"
  crypto_transfer: "crypto_transfer.csv"

  # Intermediate outputs
  user_features: "user_features.csv"
  arm_rules: "arm_rules.pkl"
  arm_features: "arm_features.csv"
  cate_scores: "cate_scores.csv"
  node_features: "node_features.csv"
  hetero_graph: "graph.pt"
  gnn_embeddings: "gnn_embeddings.npy"
  fraud_scores: "fraud_scores.csv"

# Feature Engineering
feature_engineering:
  log_transform_amounts: true
  time_features: true
  ip_features: true
  window_days: 180  # Consider only recent N days for graph construction

# ARM (Association Rule Mining)
arm:
  min_support: 0.01      # At least 1% users hit the rule
  min_confidence: 0.6    # Confidence >= 60%
  min_lift: 2.0          # Lift > 2.0 to avoid spurious correlations

  # Behavioral item thresholds
  thresholds:
    high_withdraw_ratio: 0.85
    night_tx_ratio: 0.4
    multi_ip_count: 5
    ip_shared_rate: 0.3
    buy_only_ratio: 0.9
    high_speed_trade: 10
    market_order_ratio: 0.7
    fast_swap_hours: 1
    quick_kyc_days: 1
    low_age: 22
    high_amount_single: 500000
    fixed_amount_std: 100

# Causal Forest
causal_forest:
  treatment_threshold: 2.0  # USDT volume > 2x historical mean
  n_estimators: 200
  min_samples_leaf: 10
  random_state: 42

# Heterogeneous Graph Construction
graph:
  node_types:
    - "user"
    - "wallet"
  edge_types:
    - ["user", "sends_to", "wallet"]
    - ["wallet", "receives_from", "user"]
    - ["user", "transacts_with", "user"]
  filter_null_relations: true
  filter_zero_amounts: true
  add_reverse_edges: true

# GNN Model
gnn:
  hidden_dim: 128
  out_dim: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.3
  aggregator: "gatv2"  # GATv2Conv with attention
  use_arm_edge_weights: true
  use_cf_gating: true

# Training
training:
  epochs: 100
  batch_size: 1024
  learning_rate: 0.001
  weight_decay: 0.0001
  num_neighbors: [10, 5]  # 2-layer sampling

  # Loss function
  loss_type: "focal"  # focal loss for imbalanced data
  focal_alpha: 0.25
  focal_gamma: 2.0

  # Early stopping
  patience: 10
  min_delta: 0.001

  # Data split (time-based)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# LightGBM Stacking
lightgbm:
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 63
  max_depth: -1
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42

# Explainability
explainability:
  use_shap: true
  use_gnn_explainer: true
  gnn_explainer_epochs: 200
  use_anthropic_api: true
  anthropic_model: "claude-opus-4-20250514"
  anthropic_max_tokens: 500
  top_k_high_risk: 100

# Evaluation Metrics
evaluation:
  primary_metric: "pr_auc"  # Main metric for model selection
  metrics:
    - "pr_auc"
    - "roc_auc"
    - "precision_at_100"
    - "recall_at_5pct_fpr"
    - "f1_score"

# Device
device: "cuda"  # "cuda" or "cpu"
seed: 42
